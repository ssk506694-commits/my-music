<!DOCTYPE html> <html lang="bn"> <head>     <meta charset="UTF-8">     <meta name="viewport" content="width=device-width, initial-scale=1.0">     <style>         body {              font-family: 'Segoe UI', sans-serif;              display: flex;              flex-direction: column;             align-items: center;              min-height: 100vh;              margin: 0;              padding: 20px;             background: linear-gradient(135deg, #ff416c, #4b6cb7);          }                  .player-card {              background: rgba(255, 255, 255, 0.98);              padding: 20px;              border-radius: 25px;              box-shadow: 0 15px 35px rgba(0,0,0,0.4);              width: 300px;              text-align: center;             margin-bottom: 20px;         }          .mode-switch { display: flex; justify-content: center; gap: 10px; margin-bottom: 12px; }         .mode-btn { padding: 6px 18px; border-radius: 20px; border: 2px solid #ddd; font-size: 12px; font-weight: bold; cursor: pointer; background: #fff; }         .mode-btn.active { background: #ff416c; color: white; border-color: #ff416c; }          .display-area {             width: 100%; height: 160px; border-radius: 15px; margin: 10px 0; background: #111;             display: flex; justify-content: center; align-items: center; overflow: hidden;         }         .display-area img { width: 100%; height: 100%; object-fit: cover; }          #loading-status { font-size: 14px; font-weight: bold; color: #ff416c; height: 20px; }         #id-label { font-size: 12px; color: #555; background: #eee; padding: 2px 8px; border-radius: 5px; }          .progress-bar { width: 100%; cursor: pointer; accent-color: #ff416c; margin-top: 15px; }         .time-info { display: flex; justify-content: space-between; font-size: 12px; color: #333; }                  .controls-row { display: flex; justify-content: center; gap: 8px; margin-top: 15px; }         button { background: #f8f9fa; border: 1px solid #ddd; padding: 10px; border-radius: 8px; cursor: pointer; font-size: 13px; }         .play-pause-btn { min-width: 80px; background: #333; color: #fff; border: none; font-weight: bold; }                  .nav-btn { width: 100%; margin-top: 8px; background: #4b6cb7; color: white; border: none; padding: 10px; font-weight: bold; border-radius: 8px; }         .download-btn { background: #28a745; color: white; border: none; width: 100%; margin-top: 8px; padding: 10px; font-weight: bold; border-radius: 8px; text-decoration: none; display: inline-block; }          /* হিস্ট্রি লিস্ট স্টাইল */         .history-card {             background: white; width: 300px; padding: 15px; border-radius: 20px;             box-shadow: 0 10px 25px rgba(0,0,0,0.2); max-height: 250px; overflow-y: auto;         }         .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 5px; }         .song-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #f1f1f1; font-size: 13px; }         .btn-group { display: flex; gap: 5px; }         .small-btn { padding: 4px 8px; font-size: 10px; border-radius: 4px; border: none; cursor: pointer; color: white; text-decoration: none; }     </style> </head> <body>  <div class="player-card">     <div class="mode-switch">         <button id="sd-btn" class="mode-btn active" onclick="setMode('SD')">SD</button>         <button id="hd-btn" class="mode-btn" onclick="setMode('HD')">HD</button>     </div>      <div id="loading-status"></div>     <span id="id-label">ID: 0</span>      <div class="display-area">         <img id="player-image" src="" alt="Status Image">     </div>          <audio id="main-audio"></audio>      <div class="time-info">         <span id="current">0:00</span>         <span id="total">0:00</span>     </div>     <input type="range" class="progress-bar" id="seek" value="0">      <div class="controls-row">         <button onclick="skip(-10)">-10s</button>         <button class="play-pause-btn" id="playBtn" onclick="togglePlay()">Play</button>         <button onclick="skip(10)">+10s</button>     </div>      <button class="nav-btn" onclick="nextRandomSong()">NEXT RANDOM ⏭</button>     <button class="nav-btn" onclick="previousSong()" style="background:#666;">PREVIOUS ⏮</button>          <a id="download-link" href="#" target="_blank" class="download-btn">DOWNLOAD MP3 ⬇</a> </div>  <div class="history-card">     <div class="history-header">         <strong style="font-size: 14px;">Success List</strong>         <button onclick="clearHistory()" style="font-size: 10px; color: red; border: 1px solid red; padding: 2px 5px;">Clear</button>     </div>     <div id="song-list-ui"></div> </div>  <script>     const PLAY_GIF = "https://gifdb.com/images/high/dancing-bear-milk-mocha-music-wt8tyu3kn5v5zqqs.gif";      const PAUSE_IMG = "https://i.imgur.com/9dFw09L.gif";     const BASE_URL_SD = "https://128.pagalnew.com/download-128k.php?id=1";     const BASE_URL_HD = "https://320.pagalnew.com/download-320k.php?id=1";      let currentMode = 'SD';     let currentId = 0;     let songHistory = [];     let historyIndex = -1;     let loadTimer;          const audio = document.getElementById('main-audio');     const playerImg = document.getElementById('player-image');     const playBtn = document.getElementById('playBtn');     const downloadLink = document.getElementById('download-link');      playerImg.src = PAUSE_IMG;      window.onload = () => { renderHistory(); nextRandomSong(); };      function setMode(mode) {         if (currentMode === mode) return;         currentMode = mode;         document.getElementById('sd-btn').classList.toggle('active', mode === 'SD');         document.getElementById('hd-btn').classList.toggle('active', mode === 'HD');         if (currentId !== 0) loadSong(currentId);     }      function loadSong(id) {         currentId = id;         clearTimeout(loadTimer);         document.getElementById('loading-status').innerText = "Checking " + currentMode + "...";         document.getElementById('id-label').innerText = "ID: " + id;                  const baseUrl = (currentMode === 'HD') ? BASE_URL_HD : BASE_URL_SD;         audio.src = baseUrl + id;         downloadLink.href = baseUrl + id;         audio.load();          loadTimer = setTimeout(() => {             if (audio.readyState < 3) nextRandomSong();         }, 5000);      }      audio.oncanplaythrough = function() {         clearTimeout(loadTimer);         document.getElementById('loading-status').innerText = "";         audio.play().then(() => {             saveToStorage(currentId, audio.src);         }).catch(e => {});     };      audio.onplay = () => { playBtn.innerText = "Pause"; playerImg.src = PLAY_GIF; };     audio.onpause = () => { playBtn.innerText = "Play"; playerImg.src = PAUSE_IMG; };     audio.onerror = () => { nextRandomSong(); };      function nextRandomSong() {         let newId = Math.floor(Math.random() * 10000) + 1;         songHistory.push(newId);         historyIndex = songHistory.length - 1;         loadSong(newId);     }      function previousSong() {         if (historyIndex > 0) {             historyIndex--;             loadSong(songHistory[historyIndex]);         }     }      function togglePlay() { audio.paused ? audio.play() : audio.pause(); }     function skip(sec) { audio.currentTime += sec; }      // Storage Logic     function saveToStorage(id, url) {         let saved = JSON.parse(localStorage.getItem('myMusicHistory')) || [];         if (!saved.find(s => s.id === id)) {             saved.unshift({ id, url });             localStorage.setItem('myMusicHistory', JSON.stringify(saved));             renderHistory();         }     }      function renderHistory() {         let saved = JSON.parse(localStorage.getItem('myMusicHistory')) || [];         const container = document.getElementById('song-list-ui');         container.innerHTML = saved.map(s => `             <div class="song-item">                 <span>ID: ${s.id}</span>                 <div class="btn-group">                     <button class="small-btn" style="background:#4b6cb7" onclick="loadSong(${s.id})">Play</button>                     <a href="${s.url}" target="_blank" class="small-btn" style="background:#28a745">DL</a>                 </div>             </div>         `).join('');     }      function clearHistory() {         if(confirm("Delete all history?")) {             localStorage.removeItem('myMusicHistory');             renderHistory();         }     }      audio.ontimeupdate = () => {         const seek = document.getElementById('seek');         seek.value = (audio.currentTime / audio.duration) * 100 || 0;         let curM = Math.floor(audio.currentTime / 60);         let curS = Math.floor(audio.currentTime % 60);         document.getElementById('current').innerText = `${curM}:${curS < 10 ? '0'+curS : curS}`;     };      audio.onloadedmetadata = () => {         let durM = Math.floor(audio.duration / 60);         let durS = Math.floor(audio.duration % 60);         document.getElementById('total').innerText = `${durM}:${durS < 10 ? '0'+durS : durS}`;     };      document.getElementById('seek').oninput = function() {         audio.currentTime = (this.value / 100) * audio.duration;     };      audio.onended = nextRandomSong; </script>  </body> </html>
